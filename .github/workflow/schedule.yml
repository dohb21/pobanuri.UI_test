name: 9-5 scheduler

on:
  schedule:
    # 매일 00:00 UTC (한국 시간으로 09:00)에 실행
    - cron: '0 0 * * *' 
    # 매일 08:00 UTC (한국 시간으로 17:00)에 실행
    - cron: '0 8 * * *' 

jobs:
  ui_test_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Run main.py
        run: |
          python main.py

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: screenshots/
          retention-days: 30