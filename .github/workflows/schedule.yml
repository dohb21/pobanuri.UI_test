name: 9-17 scheduler

on:
  schedule:
    # 매일 22:02 UTC (한국 시간으로 07:02)에 실행 - PC 꺼져있을 때 fallback
    - cron: '2 22 * * *'
    # 매일 08:00 UTC (한국 시간으로 15:06)에 실행 - PC 꺼져있을 때 fallback
    - cron: '6 6 * * *'

  # 수동 트리거 사용 (Cowork 스케줄러가 PC 켜져있을 때 직접 호출)
  workflow_dispatch:

  ui_test_job:
    needs: check-trigger
    if: needs.check-trigger.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Run main.py
        env:
          ID: ${{ secrets.ID }}
          PASSWORD: ${{ secrets.PASSWORD }}
          DOORAY_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python main.py

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: screenshots/
          retention-days: 30
