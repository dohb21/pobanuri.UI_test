name: 9-17 scheduler

on:
  schedule:
    # 매일 00:00 UTC (한국 시간으로 09:00)에 실행 - PC 꺼져있을 때 fallback
    - cron: '0 0 * * *'
    # 매일 08:00 UTC (한국 시간으로 17:00)에 실행 - PC 꺼져있을 때 fallback
    - cron: '0 8 * * *'

  # 수동 트리거 사용 (Cowork 스케줄러가 PC 켜져있을 때 직접 호출)
  workflow_dispatch:

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Skip if already triggered by dispatch within 30 min
        id: check
        if: github.event_name == 'schedule'
        run: |
          RUNS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?event=workflow_dispatch&per_page=5")
          SKIP=$(echo "$RUNS" | python3 -c "
          import sys, json
          from datetime import datetime, timezone, timedelta
          data = json.load(sys.stdin)
          for run in data.get('workflow_runs', []):
              t = datetime.fromisoformat(run['created_at'].replace('Z','+00:00'))
              if (datetime.now(timezone.utc) - t).total_seconds() < 21600:
                  print('true'); sys.exit()
          print('false')
          ")
          echo "skip=$SKIP" >> $GITHUB_OUTPUT

  ui_test_job:
    needs: check-trigger
    if: needs.check-trigger.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Run main.py
        env:
          ID: ${{ secrets.ID }}
          PASSWORD: ${{ secrets.PASSWORD }}
          DOORAY_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python main.py

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: screenshots/
          retention-days: 30
